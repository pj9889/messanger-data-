<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jacklyn Rose - Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0084ff; --bg: #0b0e11; --card: #151921; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #222; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card i { font-size: 2rem; color: var(--primary); margin-bottom: 10px; }
        .card h3 { font-size: 14px; color: #888; text-transform: uppercase; margin: 10px 0; }
        .card p { font-size: 28px; font-weight: bold; margin: 0; }
        .charts-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; }
        h2 { font-size: 18px; margin-bottom: 15px; color: var(--primary); }
        @media (max-width: 768px) { .charts-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-gauge-high"></i> Admin Dashboard</h1>
        <button onclick="location.reload()" style="background: var(--primary); border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
            <i class="fa-solid fa-rotate"></i> Refresh
        </button>
    </div>

    <!-- Stats Grid -->
    <div class="grid">
        <div class="card">
            <i class="fa-solid fa-eye"></i>
            <h3>Total Visits</h3>
            <p id="totalVisits">0</p>
        </div>
        <div class="card">
            <i class="fa-solid fa-mouse-pointer"></i>
            <h3>Button Clicks</h3>
            <p id="totalClicks">0</p>
        </div>
        <div class="card">
            <i class="fa-brands fa-chrome"></i>
            <h3>Chrome Redirects</h3>
            <p id="chromeRedirects">0</p>
        </div>
        <div class="card">
            <i class="fa-solid fa-globe"></i>
            <h3>Top Country</h3>
            <p id="topCountry">--</p>
        </div>
    </div>

    <!-- Charts -->
    <div class="charts-container">
        <div class="chart-box">
            <h2>Traffic Overview</h2>
            <canvas id="trafficChart"></canvas>
        </div>
        <div class="chart-box">
            <h2>Visitor Countries</h2>
            <canvas id="countryChart"></canvas>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyVRFQTgedcTyNn1GKa90IAmajFHf_y9Ml3cmVuN-2Sn2QDsU6XNIDDMroP3QcluQ/exec';

        async function fetchAnalytics() {
            try {
                // আমরা Apps Script থেকে JSON ডাটা নিয়ে আসব
                const response = await fetch(APPS_SCRIPT_URL + '?action=getStats');
                const data = await response.json();

                document.getElementById('totalVisits').innerText = data.totalVisits;
                document.getElementById('totalClicks').innerText = data.totalClicks;
                document.getElementById('chromeRedirects').innerText = data.chromeRedirects;
                document.getElementById('topCountry').innerText = data.topCountry;

                renderCharts(data);
            } catch (error) {
                console.error("Dashboard failed to load data.");
            }
        }

        function renderCharts(data) {
            // Traffic Chart
            new Chart(document.getElementById('trafficChart'), {
                type: 'bar',
                data: {
                    labels: ['Visits', 'Clicks', 'FB-to-Chrome'],
                    datasets: [{
                        label: 'Count',
                        data: [data.totalVisits, data.totalClicks, data.chromeRedirects],
                        backgroundColor: ['#0084ff', '#00c6ff', '#0055ff']
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });

            // Country Chart
            new Chart(document.getElementById('countryChart'), {
                type: 'doughnut',
                data: {
                    labels: data.countries,
                    datasets: [{
                        data: data.countryCounts,
                        backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF']
                    }]
                }
            });
        }

        window.onload = fetchAnalytics;
    </script>
</body>
</html>
