<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Multi-Source Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --messenger: #38bdf8; --website: #4361ee; --dark: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: #f8fafc; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 25px; }
        .main-container { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .section { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #334155; }
        .title { font-size: 20px; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-box { background: #0f172a; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #334155; border-bottom: 3px solid transparent; }
        .stat-box small { color: #94a3b8; font-size: 11px; text-transform: uppercase; }
        .stat-box div { font-size: 20px; font-weight: bold; margin-top: 5px; }
        .chart-wrap { height: 250px; position: relative; }
        .live-dot { height: 10px; width: 10px; background: #22c55e; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        @media (max-width: 1000px) { .main-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <h2><i class="fa-solid fa-gauge-high"></i> Master Analytics Dashboard</h2>
    <div><span class="live-dot"></span> Live Data Updating</div>
</div>

<div class="main-container">
    <!-- MESSENGER SECTION (১ম কোডের ডাটা) -->
    <div class="section">
        <div class="title" style="color: var(--messenger);"><i class="fa-brands fa-facebook-messenger"></i> Messenger Data</div>
        <div class="stats-grid">
            <div class="stat-box" style="border-bottom-color: #38bdf8;"><small>Total Visit</small><div id="m_v">0</div></div>
            <div class="stat-box" style="border-bottom-color: #22c55e;"><small>Button Click</small><div id="m_c">0</div></div>
            <div class="stat-box" style="border-bottom-color: #f59e0b;"><small>Conv. Rate</small><div id="m_ctr">0%</div></div>
        </div>
        <div class="chart-wrap"><canvas id="mChart"></canvas></div>
    </div>

    <!-- WEBSITE SECTION (২য় কোডের সব কলাম) -->
    <div class="section">
        <div class="title" style="color: var(--website);"><i class="fa-solid fa-globe"></i> Website Data</div>
        <div class="stats-grid">
            <div class="stat-box" style="border-bottom-color: #4361ee;"><small>ভিজিটর</small><div id="w_v">0</div></div>
            <div class="stat-box" style="border-bottom-color: #6f42c1;"><small>মেসেজ</small><div id="w_m">0</div></div>
            <div class="stat-box" style="border-bottom-color: #4cc9f0;"><small>ভিডিও কল</small><div id="w_vc">0</div></div>
            <div class="stat-box" style="border-bottom-color: #fd7e14;"><small>কল এগেন</small><div id="w_ca">0</div></div>
            <div class="stat-box" style="border-bottom-color: #f72585;"><small>রেজিস্ট্রেশন</small><div id="w_r">0</div></div>
        </div>
        <div class="chart-wrap"><canvas id="wChart"></canvas></div>
    </div>
</div>

<script>
    const URL_MESSENGER = 'https://script.google.com/macros/s/AKfycbzGeBPV1jHM2Y2gsM9to5eaKtVIntwXwooQqvf6wWKEWIAsLIpbM9ij0IPDxKpwRRkV/exec';
    const URL_WEBSITE = 'https://script.google.com/macros/s/AKfycbzXIlowODRnKPfVwnRmdBEOWPQ9SYtjLzSnuZxtBiiue3c6LbdC-wggDBimdLYLtAi-/exec';

    let m_chart, w_chart;

    // Messenger Data - Filter Logic
    async function loadMessenger() {
        try {
            const res = await fetch(URL_MESSENGER);
            const data = await res.json();
            const visits = data.filter(d => d.event === 'Total_Visit').length;
            const clicks = data.filter(d => d.event === 'Button_Click').length;
            const ctr = visits > 0 ? ((clicks/visits)*100).toFixed(1) + '%' : '0%';

            document.getElementById('m_v').innerText = visits;
            document.getElementById('m_c').innerText = clicks;
            document.getElementById('m_ctr').innerText = ctr;

            updateChart('mChart', m_chart, [visits, clicks], ['Visits', 'Clicks'], varName => m_chart = varName, '#38bdf8');
        } catch (e) { console.error("Messenger Error:", e); }
    }

    // Website Data - Full Columns
    async function loadWebsite() {
        try {
            const res = await fetch(URL_WEBSITE);
            const data = await res.json();

            document.getElementById('w_v').innerText = data.visitor || 0;
            document.getElementById('w_m').innerText = data.message || 0;
            document.getElementById('w_vc').innerText = data.video || 0;
            document.getElementById('w_ca').innerText = data.callagain || 0;
            document.getElementById('w_r').innerText = data.register || 0;

            const dataPoints = [data.visitor, data.message, data.video, data.callagain, data.register];
            const labels = ['ভিজিটর', 'মেসেজ', 'ভিডিও', 'কল এগেন', 'রেজিস্ট্রেশন'];
            
            updateChart('wChart', w_chart, dataPoints, labels, varName => w_chart = varName, '#4361ee');
        } catch (e) { console.error("Website Error:", e); }
    }

    function updateChart(canvasId, chartVar, dataPoints, labels, setChart, color) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        if (chartVar) {
            chartVar.data.datasets[0].data = dataPoints;
            chartVar.update();
        } else {
            const newChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{ 
                        data: dataPoints, 
                        backgroundColor: [color, '#6f42c1', '#4cc9f0', '#fd7e14', '#f72585'], 
                        borderRadius: 5 
                    }]
                },
                options: { 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } } }
                }
            });
            setChart(newChart);
        }
    }

    function refresh() { 
        loadMessenger(); 
        loadWebsite(); 
    }
    
    refresh(); 
    setInterval(refresh, 30000); 
</script>
</body>
</html>
