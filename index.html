<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lite Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #000; color: #fff; padding: 15px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .header h2 { font-size: 18px; font-weight: 500; }
        .refresh-btn { background: #0084ff; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; }

        .section-title { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #222; }
        .card span { display: block; font-size: 11px; color: #888; margin-bottom: 5px; }
        .card p { font-size: 22px; font-weight: 600; }
        
        .full-card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #222; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .full-card span { font-size: 13px; color: #888; }
        .full-card p { font-size: 16px; font-weight: bold; color: #10b981; }

        .loading { font-size: 12px; color: #0084ff; text-align: center; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Analytics</h2>
        <button class="refresh-btn" onclick="loadAll()">Refresh</button>
    </div>

    <div id="loader" class="loading">Fetching data...</div>

    <!-- Today's Data -->
    <div class="section-title">Today</div>
    <div class="grid">
        <div class="card"><span>Visits</span><p id="tv">0</p></div>
        <div class="card"><span>Clicks</span><p id="tc">0</p></div>
    </div>
    <div class="full-card"><span>Top Country</span><p id="ttc">--</p></div>

    <!-- Yesterday's Data -->
    <div class="section-title" style="margin-top: 30px;">Yesterday</div>
    <div class="grid">
        <div class="card" style="background: #090909;"><span>Visits</span><p id="yv" style="color:#ccc;">0</p></div>
        <div class="card" style="background: #090909;"><span>Clicks</span><p id="yc" style="color:#ccc;">0</p></div>
    </div>
    <div class="full-card" style="background: #090909;"><span>Top Country</span><p id="ytc" style="color: #888;">--</p></div>

    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbzcE1vKFMrPzCWsX7RAF9Cz9XXb4yB0Y4juVghvWJYx007wRu-o5ou7C8PxPdyAPN-D/exec';

        async function fetchData(date) {
            const res = await fetch(`${URL}?action=getStats&date=${date}`);
            return await res.json();
        }

        async function loadAll() {
            document.getElementById('loader').style.display = 'block';
            
            const today = new Date().toISOString().split('T')[0];
            const yesterdayDate = new Date();
            yesterdayDate.setDate(yesterdayDate.getDate() - 1);
            const yesterday = yesterdayDate.toISOString().split('T')[0];

            try {
                // Today
                const d1 = await fetchData(today);
                document.getElementById('tv').innerText = d1.visits;
                document.getElementById('tc').innerText = d1.clicks;
                document.getElementById('ttc').innerText = d1.topCountry;

                // Yesterday
                const d2 = await fetchData(yesterday);
                document.getElementById('yv').innerText = d2.visits;
                document.getElementById('yc').innerText = d2.clicks;
                document.getElementById('ytc').innerText = d2.topCountry;
            } catch (e) {
                console.log("No data yet");
            }
            
            document.getElementById('loader').style.display = 'none';
        }

        window.onload = loadAll;
    </script>
</body>
</html>
