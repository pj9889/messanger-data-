<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0084ff; --bg: #0b0e11; --card: #1c2128; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 10px; margin: 0; }
        .date-picker { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; display: flex; gap: 10px; }
        input[type="date"] { background: #333; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 8px; flex-grow: 1; outline: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .card h3 { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .card p { font-size: 24px; font-weight: bold; margin: 0; }
        .chart-box { background: var(--card); border-radius: 12px; padding: 15px; margin-top: 15px; border: 1px solid #333; min-height: 250px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="date-picker">
        <input type="date" id="dateSelector">
        <button class="btn" onclick="loadData()">Show</button>
    </div>

    <div class="grid">
        <div class="card"><h3>Visits</h3><p id="v">0</p></div>
        <div class="card"><h3>Clicks</h3><p id="c">0</p></div>
        <div class="card" style="grid-column: span 2;"><h3>Top Country</h3><p id="tc" style="color: #10b981;">--</p></div>
    </div>

    <div class="chart-box">
        <h3 style="color:#888; font-size: 11px; text-align: center; margin-bottom: 10px;">COUNTRY DISTRIBUTION (%)</h3>
        <canvas id="countryChart"></canvas>
    </div>

    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbzcE1vKFMrPzCWsX7RAF9Cz9XXb4yB0Y4juVghvWJYx007wRu-o5ou7C8PxPdyAPN-D/exec';
        let myChart;

        // আজকের তারিখ সেট করা
        document.getElementById('dateSelector').value = new Date().toISOString().split('T')[0];

        async function loadData() {
            const date = document.getElementById('dateSelector').value;
            const btn = document.querySelector('.btn');
            btn.innerText = '...';
            try {
                const res = await fetch(`${URL}?action=getStats&date=${date}`);
                const d = await res.json();
                
                document.getElementById('v').innerText = d.visits;
                document.getElementById('c').innerText = d.clicks;
                document.getElementById('tc').innerText = d.topCountry;

                if(myChart) myChart.destroy();
                myChart = new Chart(document.getElementById('countryChart'), {
                    type: 'doughnut',
                    data: {
                        labels: d.countries.map((name, i) => name + " (" + d.countryCounts[i] + "%)"),
                        datasets: [{
                            data: d.countryCounts,
                            backgroundColor: ['#0084ff', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
                        }]
                    },
                    options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff', font: {size: 10} } } } }
                });
            } catch(e) { alert("Data error or No data!"); }
            btn.innerText = 'Show';
        }
        window.onload = loadData;
    </script>
</body>
</html>
