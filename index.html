<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Analytics</title>
    <style>
        :root { --fire: linear-gradient(45deg, #f093fb 0%, #f5576c 100%); --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 20px; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 26px; background: var(--fire); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; font-weight: 800; letter-spacing: 1px; }
        
        .range-box { background: #111; padding: 15px; border-radius: 20px; border: 1px solid #222; margin-bottom: 20px; }
        .range-box input { background: #222; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 12px; width: 42%; font-size: 12px; outline: none; }
        .btn-search { width: 100%; margin-top: 12px; background: var(--fire); border: none; padding: 14px; border-radius: 14px; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #111; padding: 25px 15px; border-radius: 25px; border: 1px solid #222; text-align: center; }
        .card span { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .card h2 { font-size: 36px; margin: 10px 0 0; font-weight: 800; }
        
        .list-box { margin-top: 30px; }
        .list-item { background: #0a0a0a; padding: 15px; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1a1a1a; }
        .list-item .date-txt { color: #888; font-size: 13px; font-weight: 500; }
        .list-item .val-txt { font-weight: bold; color: #f5576c; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>FIRE ANALYTICS</h1>
        <p style="color:#444; font-size: 11px; margin-top: 5px;">PREMIUM DASHBOARD</p>
    </div>

    <div class="range-box">
        <div style="display: flex; justify-content: space-between;">
            <input type="date" id="start">
            <input type="date" id="end">
        </div>
        <button class="btn-search" onclick="loadStats()">Get Report</button>
    </div>

    <div class="stat-grid">
        <div class="card">
            <span>Visits</span>
            <h2 id="v">0</h2>
        </div>
        <div class="card">
            <span>Clicks</span>
            <h2 id="c">0</h2>
        </div>
    </div>

    <div class="list-box" id="logs"></div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbxg7E5_FvFP40PFer_IjoCk1aQQgQauo97eQt3qNWSH43nQH80SiBE5r5LhHTSbf6d5/exec';
        
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('start').value = today;
        document.getElementById('end').value = today;

        async function loadStats() {
            const s = document.getElementById('start').value;
            const e = document.getElementById('end').value;
            const btn = document.querySelector('.btn-search');
            
            btn.innerText = 'LOADING...';
            try {
                const res = await fetch(`${API}?start=${s}&end=${e}`);
                const data = await res.json();
                
                document.getElementById('v').innerText = data.totalVisits || 0;
                document.getElementById('c').innerText = data.totalClicks || 0;
                
                let html = '';
                data.history.forEach(item => {
                    html += `<div class="list-item">
                        <span class="date-txt">${item.date}</span>
                        <span class="val-txt">${item.v} V | ${item.c} C</span>
                    </div>`;
                });
                document.getElementById('logs').innerHTML = html || '<p style="text-align:center;color:#333;font-size:12px;">No data found</p>';
            } catch(err) {
                alert("Error fetching data!");
            }
            btn.innerText = 'Get Report';
        }

        window.onload = loadStats;
    </script>
</body>
</html>
