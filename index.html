<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Multi-Source Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --messenger: #0084ff; --website: #22c55e; --dark: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: #f8fafc; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 25px; }
        .main-container { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .section { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #334155; }
        .title { font-size: 20px; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: #0f172a; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #334155; }
        .stat-box small { color: #94a3b8; font-size: 12px; }
        .stat-box div { font-size: 22px; font-weight: bold; margin-top: 5px; }
        .chart-wrap { height: 200px; position: relative; }
        .live-dot { height: 10px; width: 10px; background: #ef4444; border-radius: 50%; display: inline-block; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        @media (max-width: 900px) { .main-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <h2><i class="fa-solid fa-chart-pie"></i> Combined Live Analytics</h2>
    <div><span class="live-dot"></span> Live Updating</div>
</div>

<div class="main-container">
    <!-- MESSENGER SECTION (Array Format) -->
    <div class="section">
        <div class="title" style="color: var(--messenger);"><i class="fa-brands fa-facebook-messenger"></i> Messenger Data</div>
        <div class="stats-grid">
            <div class="stat-box"><small>Total Visit</small><div id="m_v">0</div></div>
            <div class="stat-box"><small>Button Click</small><div id="m_c">0</div></div>
        </div>
        <div class="chart-wrap"><canvas id="mChart"></canvas></div>
    </div>

    <!-- WEBSITE SECTION (Object Format) -->
    <div class="section">
        <div class="title" style="color: var(--website);"><i class="fa-solid fa-globe"></i> Website Data</div>
        <div class="stats-grid">
            <div class="stat-box"><small>Visitor</small><div id="w_v">0</div></div>
            <div class="stat-box"><small>Register</small><div id="w_r">0</div></div>
        </div>
        <div class="chart-wrap"><canvas id="wChart"></canvas></div>
    </div>
</div>

<script>
    const URL_MESSENGER = 'https://script.google.com/macros/s/AKfycbzGeBPV1jHM2Y2gsM9to5eaKtVIntwXwooQqvf6wWKEWIAsLIpbM9ij0IPDxKpwRRkV/exec';
    const URL_WEBSITE = 'https://script.google.com/macros/s/AKfycbzXIlowODRnKPfVwnRmdBEOWPQ9SYtjLzSnuZxtBiiue3c6LbdC-wggDBimdLYLtAi-/exec';

    let m_chart, w_chart;

    // Messenger Data লোড করার ফাংশন (যেটা Array ফরম্যাটে আসে)
    async function loadMessenger() {
        try {
            const res = await fetch(URL_MESSENGER);
            const data = await res.json();
            const visits = data.filter(d => d.event === 'Total_Visit').length;
            const clicks = data.filter(d => d.event === 'Button_Click').length;

            document.getElementById('m_v').innerText = visits;
            document.getElementById('m_c').innerText = clicks;

            updateChart('mChart', m_chart, [visits, clicks], ['Visits', 'Clicks'], varName => m_chart = varName, '#0084ff');
        } catch (e) { console.error("Messenger Error:", e); }
    }

    // Website Data লোড করার ফাংশন (যেটা সরাসরি Object ফরম্যাটে আসে)
    async function loadWebsite() {
        try {
            const res = await fetch(URL_WEBSITE);
            const data = await res.json();

            document.getElementById('w_v').innerText = data.visitor;
            document.getElementById('w_r').innerText = data.register;

            updateChart('wChart', w_chart, [data.visitor, data.register, data.message], ['Visitor', 'Reg', 'Msg'], varName => w_chart = varName, '#22c55e');
        } catch (e) { console.error("Website Error:", e); }
    }

    function updateChart(canvasId, chartVar, dataPoints, labels, setChart, color) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        if (chartVar) {
            chartVar.data.datasets[0].data = dataPoints;
            chartVar.update();
        } else {
            const newChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{ data: dataPoints, backgroundColor: color, borderRadius: 5 }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
            setChart(newChart);
        }
    }

    function refresh() { loadMessenger(); loadWebsite(); }
    
    refresh(); 
    setInterval(refresh, 30000); // ৩০ সেকেন্ড পর পর আপডেট হবে
</script>
</body>
</html>
