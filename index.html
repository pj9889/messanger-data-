<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jacklyn Chat - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #1e293b; padding-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #1e293b; padding: 25px; border-radius: 15px; border: 1px solid #334155; text-align: left; position: relative; }
        .card i { position: absolute; right: 20px; top: 20px; font-size: 24px; color: #38bdf8; opacity: 0.5; }
        .card h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; }
        .card p { font-size: 32px; font-weight: bold; margin-top: 10px; color: #fff; }
        .table-container { background: #1e293b; border-radius: 15px; border: 1px solid #334155; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #334155; padding: 15px; color: #38bdf8; font-size: 14px; }
        td { padding: 15px; border-bottom: 1px solid #334155; font-size: 14px; }
        .status-visit { color: #38bdf8; font-weight: bold; }
        .status-click { color: #22c55e; font-weight: bold; }
        .refresh-btn { background: #38bdf8; color: #000; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2><i class="fa-solid fa-gauge-high"></i> Traffic Dashboard</h2>
        <button class="refresh-btn" onclick="loadStats()">Refresh Data</button>
    </div>

    <div class="grid">
        <div class="card">
            <i class="fa-solid fa-users"></i>
            <h3>Total Visitors</h3>
            <p id="totalVisits">0</p>
        </div>
        <div class="card">
            <i class="fa-solid fa-mouse-pointer"></i>
            <h3>Button Clicks</h3>
            <p id="totalClicks" style="color: #22c55e;">0</p>
        </div>
        <div class="card">
            <i class="fa-solid fa-bolt"></i>
            <h3>Conversion Rate</h3>
            <p id="ctr">0%</p>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Event Type</th>
                    <th>IP Address</th>
                    <th>Browser/Device Info</th>
                </tr>
            </thead>
            <tbody id="dataTable">
                <tr><td colspan="4" style="text-align:center;">Loading data...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzGeBPV1jHM2Y2gsM9to5eaKtVIntwXwooQqvf6wWKEWIAsLIpbM9ij0IPDxKpwRRkV/exec';

        async function loadStats() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                let visits = data.filter(d => d.event === 'Total_Visit').length;
                let clicks = data.filter(d => d.event === 'Button_Click').length;
                
                document.getElementById('totalVisits').innerText = visits;
                document.getElementById('totalClicks').innerText = clicks;
                document.getElementById('ctr').innerText = visits > 0 ? ((clicks/visits)*100).toFixed(1) + '%' : '0%';

                const tableBody = document.getElementById('dataTable');
                tableBody.innerHTML = '';
                
                data.reverse().slice(0, 30).forEach(row => {
                    const tr = document.createElement('tr');
                    const eventClass = row.event === 'Button_Click' ? 'status-click' : 'status-visit';
                    tr.innerHTML = `
                        <td>${new Date(row.timestamp).toLocaleString()}</td>
                        <td><span class="${eventClass}">${row.event}</span></td>
                        <td>${row.ip}</td>
                        <td title="${row.ua}">${row.ua.substring(0, 40)}...</td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (e) {
                document.getElementById('dataTable').innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">Error: Make sure doGet is added in GS and Deployed as Anyone.</td></tr>';
            }
        }

        loadStats();
        setInterval(loadStats, 30000); // অটো আপডেট হবে প্রতি ৩০ সেকেন্ডে
    </script>
</body>
</html>
