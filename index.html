<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0084ff; --bg: #0b0e11; --card: #151921; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .card h3 { font-size: 12px; color: #aaa; text-transform: uppercase; }
        .card p { font-size: 24px; font-weight: bold; margin-top: 10px; }
        .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .chart-container { background: var(--card); padding: 15px; border-radius: 12px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        @media (max-width: 768px) { .charts { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2><i class="fa-solid fa-gauge"></i> Real-time Traffic</h2>
        <button class="btn" onclick="loadStats()"><i class="fa-solid fa-rotate"></i> Refresh</button>
    </div>

    <div class="grid">
        <div class="card"><h3>Total Visits</h3><p id="v">0</p></div>
        <div class="card"><h3>Direct Clicks</h3><p id="c">0</p></div>
        <div class="card"><h3>FB to Chrome</h3><p id="cr">0</p></div>
        <div class="card"><h3>Top Country</h3><p id="tc">--</p></div>
    </div>

    <div class="charts">
        <div class="chart-container"><canvas id="chart1"></canvas></div>
        <div class="chart-container"><canvas id="chart2"></canvas></div>
    </div>

    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbxr9BXhUgsBNQ4P55z87Lfv4CKkc5MZx-GYu75ZcZzV-sT3jygR7U-A3DjLXDxnKgum/exec';
        let ch1, ch2;

        async function loadStats() {
            try {
                const res = await fetch(URL + '?action=getStats');
                const d = await res.json();
                
                document.getElementById('v').innerText = d.totalVisits;
                document.getElementById('c').innerText = d.totalClicks;
                document.getElementById('cr').innerText = d.chromeRedirects;
                document.getElementById('tc').innerText = d.topCountry;

                if(ch1) ch1.destroy(); if(ch2) ch2.destroy();
                
                ch1 = new Chart(document.getElementById('chart1'), {
                    type: 'bar',
                    data: { labels: ['Visits', 'Clicks', 'FB-to-CR'], datasets: [{ data: [d.totalVisits, d.totalClicks, d.chromeRedirects], backgroundColor: ['#0084ff', '#10b981', '#f59e0b'] }] }
                });

                ch2 = new Chart(document.getElementById('chart2'), {
                    type: 'pie',
                    data: { labels: d.countries, datasets: [{ data: d.countryCounts, backgroundColor: ['#ef4444', '#3b82f6', '#10b981', '#f59e0b'] }] }
                });
            } catch(e) { alert("Error loading data!"); }
        }
        window.onload = loadStats;
    </script>
</body>
</html>
