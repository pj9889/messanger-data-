<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0084ff; --bg: #0b0e11; --card: #1c2128; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 10px; margin:0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .card h3 { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .card p { font-size: 22px; font-weight: bold; margin: 0; }
        .chart-box { background: var(--card); margin: 10px; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div style="padding: 15px; display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin:0; font-size: 20px;">Live Stats</h2>
        <button class="btn" onclick="loadData()"><i class="fa-solid fa-rotate"></i> Refresh</button>
    </div>

    <div class="grid">
        <div class="card"><h3>Visits</h3><p id="v">0</p></div>
        <div class="card"><h3>Direct</h3><p id="c">0</p></div>
        <div class="card"><h3>Continue</h3><p id="cr">0</p></div>
        <div class="card"><h3>Go Back</h3><p id="gb">0</p></div>
    </div>

    <div class="chart-box">
        <h3 style="color:#aaa; font-size: 12px; margin-bottom: 15px;">Country Distribution (%)</h3>
        <canvas id="countryChart"></canvas>
    </div>

    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbxY4wSe3uVqD1R8fZIB8DFsG3qPSskbC7xsDPGoaluYbcn6QYQDee4A6utjm-9DAoG0/exec';
        let myChart;

        async function loadData() {
            try {
                const res = await fetch(URL + '?action=getStats');
                const d = await res.json();
                
                document.getElementById('v').innerText = d.totalVisits;
                document.getElementById('c').innerText = d.totalClicks;
                document.getElementById('cr').innerText = d.chromeRedirects;
                document.getElementById('gb').innerText = d.goBackCount;

                if(myChart) myChart.destroy();
                myChart = new Chart(document.getElementById('countryChart'), {
                    type: 'doughnut',
                    data: {
                        labels: d.countries.map((name, i) => name + " (" + d.countryCounts[i] + "%)"),
                        datasets: [{
                            data: d.countryCounts,
                            backgroundColor: ['#0084ff', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
                        }]
                    },
                    options: { plugins: { legend: { position: 'bottom', labels: { color: '#fff', font: { size: 10 } } } } }
                });
            } catch(e) { console.log("Load Error"); }
        }
        window.onload = loadData;
    </script>
</body>
</html>
